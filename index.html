<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yousef Khawaja Car Service | מוסך יוסף ח’וואג’ה</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            width: 90%;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 5px;
        }
        h2 {
            color: #5f6368;
            font-weight: normal;
            margin-bottom: 25px;
        }
        p {
            font-size: 16px;
            color: #555;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }
        .btn {
            color: white;
            padding: 16px 32px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 300px;
            gap: 10px;
            transition: background-color 0.3s, transform 0.2s;
        }
        .btn-maps {
            background-color: #1a73e8;
        }
        .btn-maps:hover {
            background-color: #1557b0;
            transform: translateY(-2px);
        }
        .btn-waze {
            background-color: #33ccff;
            color: #000;
        }
        .btn-waze:hover {
            background-color: #2bb8e6;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #999;
        }
        svg {
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Yousef Khawaja Car Service</h1>
        <h2 dir="rtl">מוסך יוסף ח’וואג’ה</h2>
        
        <p>Welcome! Choose your preferred navigation app below to get directions to our garage.</p>
        
        <div class="button-group">
            <!-- Google Maps Button -->
            <a href="https://maps.app.goo.gl/6FseKXTNLLrQRQev5?g_st=ic" target="_blank" class="btn btn-maps">
                <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
                Open in Google Maps
            </a>
            
            <!-- Waze Button (Fixed with real link) -->
            <a href="https://waze.com/ul?q=%D7%9E%D7%95%D7%A1%D7%9A%20%D7%99%D7%95%D7%A1%D7%A3%20%D7%97%E2%80%99%D7%95%D7%95%D7%90%D7%92%E2%80%99%D7%94" target="_blank" class="btn btn-waze">
                <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12.003 2.155c-5.52 0-9.99 4.398-9.99 9.832 0 1.63.4 3.17 1.12 4.54l-1.07 3.32c-.17.52.33 1.01.85.83l3.35-1.06c1.37.69 2.92 1.07 4.54 1.07 2.1 0 4.09-.64 5.76-1.78l1.37-1.37-1.18-1.18c-1.35.9-2.97 1.43-4.7 1.43-4.5 0-8.15-3.61-8.15-8.07s3.65-8.07 8.15-8.07 8.15 3.61 8.15 8.07c0 .54-.05 1.07-.15 1.58h1.8c.11-.51.17-1.04.17-1.58 0-5.434-4.473-9.832-9.993-9.832z"/>
                </svg>
                Open in Waze
            </a>
        </div>
        
        <div class="footer">
            &copy; <script>document.write(new Date().getFullYear())</script> Yousef Khawaja Car Service
        </div>
    </div>

</body>
</html>
